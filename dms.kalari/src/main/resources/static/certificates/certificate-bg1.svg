        <circle cx="0" cy="0" r="19" fill="none" stroke="#7a5c10" stroke-width="1.8"/>
        <circle cx="0" cy="0" r="12" fill="none" stroke="#c9a84c" stroke-width="1"/>
        <circle cx="0" cy="0" r="5"  fill="#8b6914"/>
        <line x1="-19" y1="0"   x2="19"  y2="0"   stroke="#8b6914" stroke-width="1"/>
        <line x1="0"   y1="-19" x2="0"   y2="19"  stroke="#8b6914" stroke-width="1"/>
        <line x1="-13" y1="-13" x2="13"  y2="13"  stroke="#c9a84c" stroke-width="0.8"/>
        <line x1="13"  y1="-13" x2="-13" y2="13"  stroke="#c9a84c" stroke-width="0.8"/>
