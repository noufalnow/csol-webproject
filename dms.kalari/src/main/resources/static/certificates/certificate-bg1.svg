    <!-- Inner border -->
    <rect x="18" y="18" width="1086" height="758" fill="none" stroke="#c9a84c" stroke-width="1"/>
    <!-- Innermost thin -->
    <rect x="23" y="23" width="1076" height="748" fill="none" stroke="#d4b060" stroke-width="0.4"/>

    <!-- Corner ornaments -->
    <!-- TL -->
    <g transform="translate(11,11)">
