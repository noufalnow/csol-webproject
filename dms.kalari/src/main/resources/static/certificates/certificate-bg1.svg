<?xml version="1.0" encoding="UTF-8"?>
<svg
    width="297mm"
    height="210mm"
    viewBox="0 0 1122 794"
    xmlns="http://www.w3.org/2000/svg">

    <!-- Parchment base -->
    <rect width="1122" height="794" fill="#fdf8ef"/>

    <!-- Top header band (behind logo area) -->
    <rect x="11" y="11" width="1100" height="105" fill="#ede3c8"/>
    <line x1="11"  y1="116" x2="1111" y2="116" stroke="#7a5c10" stroke-width="2"/>
    <line x1="11"  y1="120" x2="1111" y2="120" stroke="#c9a84c" stroke-width="0.7"/>



