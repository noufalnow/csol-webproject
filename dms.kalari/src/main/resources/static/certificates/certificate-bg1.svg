    <rect x="553" y="4"    width="16" height="16" transform="rotate(45,561,12)"   fill="#8b6914"/>
    <rect x="556" y="7"    width="10" height="10" transform="rotate(45,561,12)"   fill="#fdf8ef"/>
    <rect x="553" y="776"  width="16" height="16" transform="rotate(45,561,784)"  fill="#8b6914"/>
    <rect x="556" y="779"  width="10" height="10" transform="rotate(45,561,784)"  fill="#fdf8ef"/>
    <rect x="4"   y="389"  width="16" height="16" transform="rotate(45,12,397)"   fill="#8b6914"/>
    <rect x="7"   y="392"  width="10" height="10" transform="rotate(45,12,397)"   fill="#fdf8ef"/>
    <rect x="1102" y="389" width="16" height="16" transform="rotate(45,1110,397)" fill="#8b6914"/>
    <rect x="1105" y="392" width="10" height="10" transform="rotate(45,1110,397)" fill="#fdf8ef"/>

    <!-- Watermark mandala — very faint, stroke reduced to near-invisible -->
    <g transform="translate(561,430)" fill="none" stroke="#c8b060" opacity="0.10">
        <circle cx="0" cy="0" r="155" stroke-width="8"/>
        <circle cx="0" cy="0" r="115" stroke-width="4"/>
        <circle cx="0" cy="0" r="75"  stroke-width="2.5"/>
        <circle cx="0" cy="0" r="38"  stroke-width="1.5"/>
        <line x1="0"    y1="-155" x2="0"    y2="155"  stroke-width="2"/>
        <line x1="-155" y1="0"    x2="155"  y2="0"    stroke-width="2"/>
        <line x1="-110" y1="-110" x2="110"  y2="110"  stroke-width="1.2"/>
        <line x1="110"  y1="-110" x2="-110" y2="110"  stroke-width="1.2"/>
        <line x1="-59"  y1="-144" x2="59"   y2="144"  stroke-width="0.8"/>
        <line x1="59"   y1="-144" x2="-59"  y2="144"  stroke-width="0.8"/>
        <line x1="-144" y1="-59"  x2="144"  y2="59"   stroke-width="0.8"/>
        <line x1="144"  y1="-59"  x2="-144" y2="59"   stroke-width="0.8"/>
        <ellipse cx="0" cy="-96" rx="16" ry="35" stroke-width="1"/>
        <ellipse cx="0" cy="-96" rx="16" ry="35" transform="rotate(45)"  stroke-width="1"/>
        <ellipse cx="0" cy="-96" rx="16" ry="35" transform="rotate(90)"  stroke-width="1"/>
        <ellipse cx="0" cy="-96" rx="16" ry="35" transform="rotate(135)" stroke-width="1"/>
        <ellipse cx="0" cy="-96" rx="16" ry="35" transform="rotate(180)" stroke-width="1"/>
        <ellipse cx="0" cy="-96" rx="16" ry="35" transform="rotate(225)" stroke-width="1"/>
        <ellipse cx="0" cy="-96" rx="16" ry="35" transform="rotate(270)" stroke-width="1"/>
        <ellipse cx="0" cy="-96" rx="16" ry="35" transform="rotate(315)" stroke-width="1"/>
