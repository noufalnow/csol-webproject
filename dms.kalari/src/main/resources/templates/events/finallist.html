<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
<title>Final Result</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>

	/* ── Variables ── */
	:root {
	  --primary: #1a1a2e;
	  --accent: #2563eb;
	  --accent-light: #dbeafe;
	  --success: #047857;
	  --success-light: #ecfdf5;
	  --surface: #fff;
	  --bg: #f1f5f9;
	  --border: #e2e8f0;
	  --text-main: #111827;
	  --text-muted: #64748b;
	  --radius: 12px;
	  --radius-sm: 8px;
	}

	*, *::before, *::after { box-sizing: border-box; }

	html {
	  overflow-x: scroll;
	  overflow-y: scroll;
	  -webkit-overflow-scrolling: touch;
	  scrollbar-color: #f20d18 #e2e8f0;
	  scrollbar-width: auto;
	  scroll-behavior: auto;
	}
	html::-webkit-scrollbar { width: 6px; }
	html::-webkit-scrollbar-track { background: #e2e8f0; }
	html::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 3px; }
	html::-webkit-scrollbar-thumb:hover { background: #475569; }

	body {
	  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
	  font-size: 14px;
	  color: var(--text-main);
	  background: var(--bg);
	  margin: 0;
	  min-height: 100%;
	  -webkit-font-smoothing: antialiased;
	}

	.page-wrapper {
	  max-width: 1040px;
	  margin: 0 auto;
	  padding: 16px 12px 32px;
	}

	h2 { font-size: 18px; font-weight: 700; margin: 0 0 12px; color: var(--primary); }

	/* ── Event Header ── */
	.event-header {
	  background: #fff;
	  border: 1px solid #ccc;
	  border-radius: 6px;
	  padding: 14px 16px 10px;
	  margin-bottom: 14px;
	}
	.event-header .event-name {
	  font-size: 16pt; font-weight: 800; color: var(--primary);
	  margin: 0 0 2px; letter-spacing: .3px; text-align: center;
	}
	.event-header .event-host {
	  font-size: 10.5pt; color: #444; margin: 0 0 8px;
	}
	.event-meta {
	  display: flex; flex-wrap: wrap; gap: 6px 20px;
	  font-size: 9pt; color: #555;
	  border-top: 1px solid #e0e0e0; padding-top: 8px;
	}
	.event-meta span i { margin-right: 4px; opacity: .7; }

	/* ── Filter Card ── */
	.filter-card {
	  background: var(--surface); border: 1px solid var(--border);
	  border-radius: var(--radius); padding: 14px; margin-bottom: 14px;
	  box-shadow: 0 1px 4px rgba(0,0,0,.04);
	}
	.filter-card .form-select,
	.filter-card .form-control {
	  font-size: 13px; padding: 8px 10px;
	  border-radius: var(--radius-sm); border-color: var(--border); height: auto;
	}
	.filter-card .btn { font-size: 13px; padding: 8px 14px; border-radius: var(--radius-sm); height: auto; }
	.filter-label {
	  font-size: 11px; font-weight: 600; color: var(--text-muted);
	  text-transform: uppercase; letter-spacing: .6px; margin-bottom: 4px;
	}

	/* ── Print Button ── */
	.btn-print { font-size: 13px; padding: 8px 16px; margin-bottom: 14px; border-radius: var(--radius-sm); }

	/* ── Item Block ── */
	.item-block {
	  background: var(--surface); border: 1px solid var(--border);
	  border-radius: var(--radius); margin-bottom: 20px;
	  overflow: hidden; box-shadow: 0 1px 6px rgba(0,0,0,.06);
	}
	.item-heading {
	  background: var(--primary); color: #fff; padding: 12px 16px;
	  font-size: 14px; font-weight: 700;
	  display: flex; justify-content: space-between; align-items: center; gap: 8px;
	}
	.item-heading .badge {
	  font-size: 11px; font-weight: 600;
	  background: rgba(255,255,255,.2) !important; color: #fff; white-space: nowrap;
	}

	/* ── Gender Block ── */
	.gender-block { padding: 12px 14px 8px; }
	.gender-heading {
	  background: #eff6ff; color: #1d4ed8; padding: 10px 14px;
	  border-left: 4px solid #2563eb; border-radius: var(--radius-sm);
	  margin-bottom: 12px; font-weight: 700; font-size: 13px;
	  display: flex; justify-content: space-between; align-items: center;
	}

	/* ── Category Heading ── */
	.category-heading {
	  background: #f8fafc; padding: 9px 14px; border-radius: var(--radius-sm);
	  border: 1px solid var(--border); margin-bottom: 10px; font-weight: 600;
	  font-size: 13px; display: flex; justify-content: space-between;
	  align-items: center; gap: 6px;
	}
	.category-heading .badge { font-size: 11px; white-space: nowrap; }

	/* ── Table Responsive ── */
	.table-responsive {
	  overflow-x: auto;
	  -webkit-overflow-scrolling: touch;
	  scrollbar-width: thin;
	  scrollbar-color: #94a3b8 #e2e8f0;
	}
	.table-responsive::-webkit-scrollbar { height: 6px; }
	.table-responsive::-webkit-scrollbar-track { background: #e2e8f0; border-radius: 3px; }
	.table-responsive::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 3px; }
	.table-responsive::-webkit-scrollbar-thumb:hover { background: #64748b; }

	/* ── Result Table ── */
	.result-table {
	  width: 100%;
	  border-collapse: collapse;
	  font-size: 12px;
	  margin-bottom: 0;
	}
	.result-table thead th {
	  font-size: 11px; font-weight: 700; letter-spacing: .4px;
	  vertical-align: middle; padding: 6px 10px; white-space: nowrap;
	}
	.result-table tbody td {
	  vertical-align: middle; padding: 6px 10px; font-size: 12px;
	  border-color: var(--border); line-height: 1.4;
	}
	.result-table tbody tr:hover { background: #f8fafc; }

	.chest-no {
	  text-align: center; font-size: 15px; font-weight: 800; color: var(--primary);
	}
	.participant-name { font-weight: 700; font-size: 12px; margin-bottom: 2px; }
	.participant-meta { font-size: 11px; color: var(--text-muted); line-height: 1.4; }
	.judge-stack { font-size: 11px; line-height: 1.6; text-align: center; font-weight: 600; }
	.final-score { text-align: center; font-size: 13px; font-weight: 800; color: #1d4ed8; }
	.grade-col { text-align: center; font-weight: 700; }

	/* ── Score / Grade Pills ── */
	.score-pill {
	  background: var(--accent-light); color: #1d4ed8; padding: 3px 10px;
	  border-radius: 30px; font-weight: 700; font-size: 11px;
	  min-width: 44px; display: inline-block; text-align: center;
	}
	.grade-pill {
	  background: var(--success-light); color: var(--success); padding: 3px 10px;
	  border-radius: 30px; font-weight: 700; font-size: 11px;
	  min-width: 44px; display: inline-block; text-align: center;
	}

	/* ── Footer sig lines ── */
	.tab-footer {
	  display: flex; gap: 40px; justify-content: flex-end;
	  padding: 16px 14px 4px; border-top: 1px solid var(--border); margin-top: 8px;
	}
	.footer-box { text-align: center; min-width: 160px; }
	.sign-line { border-bottom: 1px solid #333; margin-bottom: 4px; height: 32px; }
	.sign-label { font-size: 10px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }

	/* ── FAB ── */
	.scroll-fab {
	  position: fixed; right: 14px; bottom: 24px; z-index: 999;
	  display: flex; flex-direction: column; gap: 8px;
	  pointer-events: none;
	}
	.scroll-fab button {
	  pointer-events: all;
	  width: 42px; height: 42px; border-radius: 50%; border: none;
	  background: var(--primary); color: #fff; font-size: 16px; cursor: pointer;
	  box-shadow: 0 3px 10px rgba(0,0,0,.28);
	  display: flex; align-items: center; justify-content: center;
	  transition: background .2s, transform .15s, opacity .2s;
	  opacity: 0.85; -webkit-tap-highlight-color: transparent;
	}
	.scroll-fab button:hover,
	.scroll-fab button:active { background: var(--accent); opacity: 1; transform: scale(1.08); }
	.scroll-fab #fabTop { display: none; }
	.scroll-fab.show-top #fabTop { display: flex; }

	/* ── Print ── */
	.print-only { display: none; }

	@media print {
	  @page { margin: 0.4in; size: letter portrait; }

	  * { overflow: visible !important; }

	  body { background: #fff !important; font-size: 8pt; color: #000; }

	  .page-wrapper { padding: 0; max-width: 100%; }

	  .no-print, #search-form, .scroll-fab, .tab-footer, .no-print { display: none !important; }

	  .event-header {
	    background: none !important; border: none !important;
	    border-bottom: 2px solid #000 !important; border-radius: 0 !important;
	    padding: 0 0 8px !important; margin-bottom: 10px; box-shadow: none !important;
	  }
	  .event-header .event-name { font-size: 13pt !important; color: #000 !important; }
	  .event-header .event-host { color: #333 !important; }
	  .event-meta { border-top: 1px solid #999; color: #333 !important; }

	  .item-block {
	    background: none !important; border: none !important;
	    border-radius: 0 !important; box-shadow: none !important;
	    overflow: visible !important;
	  }

	  .item-heading {
	    background: var(--primary) !important; color: #fff !important;
	    -webkit-print-color-adjust: exact; print-color-adjust: exact;
	    border-radius: 0 !important;
	    break-after: avoid;
	  }

	  .gender-block { overflow: visible !important; }
	  .gender-heading { break-after: avoid; }
	  .category-heading { break-after: avoid; }

	  .table-responsive {
	    display: block !important;
	    overflow: visible !important;
	  }

	  table {
	    font-size: 7.5pt;
	    border-collapse: collapse !important;
	    width: 100% !important;
	  }

	  th {
	    background: #e0e0e0 !important;
	    -webkit-print-color-adjust: exact;
	    print-color-adjust: exact;
	  }

	  thead { display: table-header-group; }

	  th, td { padding: 2px 5px !important; line-height: 1.2 !important; }

	  .result-table thead th { font-size: 7pt; padding: 2px 5px !important; }
	  .result-table tbody td { font-size: 7.5pt; padding: 2px 5px !important; }

	  .item-heading { padding: 5px 10px !important; font-size: 9pt !important; }
	  .gender-heading { padding: 3px 10px !important; font-size: 8.5pt !important; margin-bottom: 3px !important; }
	  .category-heading { padding: 3px 10px !important; font-size: 8.5pt !important; margin-bottom: 3px !important; }
	  .gender-block { padding: 5px 7px 3px !important; }

	  .chest-no { font-size: 10pt !important; }
	  .final-score { font-size: 9pt !important; }

	  .page-break-before { page-break-before: always; break-before: page; }
	  .page-break-after { page-break-after: always; break-after: page; }

	  .print-only { display: block; margin-top: 16px; text-align: center; font-size: 9pt; color: #666; }
	}

	/* ── Mobile ≤ 767px ── */
	@media screen and (max-width: 767px) {
	  html, body, .page-wrapper, .item-block, .gender-block {
	    transform: none !important;
	    will-change: auto !important;
	    backface-visibility: visible !important;
	  }

	  .page-wrapper { padding: 12px 10px 80px; }

	  .event-header { padding: 14px 13px 12px; }
	  .event-header .event-name { font-size: 15px; }
	  .event-meta { flex-direction: column; gap: 4px; }

	  .item-heading { font-size: 13px; padding: 11px 13px; }
	  .gender-block { padding: 10px 11px 6px; }
	  .gender-heading { font-size: 12px; padding: 8px 12px; }
	  .category-heading { font-size: 12px; padding: 8px 12px; }

	  .result-table thead th { font-size: 10px; padding: 5px 7px; }
	  .result-table tbody td { font-size: 11px; padding: 5px 7px; }

	  .chest-no { font-size: 13px; }
	  .participant-name { font-size: 11px; }
	  .participant-meta { font-size: 10px; }
	  .judge-stack { font-size: 10px; }
	  .final-score { font-size: 12px; }

	  .tab-footer { gap: 16px; padding: 12px 10px 4px; }
	  .footer-box { min-width: 120px; }

	  .scroll-fab button { width: 38px; height: 38px; font-size: 14px; }

	  .filter-card .row {
	    flex-direction: row !important;
	    flex-wrap: wrap !important;
	  }
	  .filter-card .col-6 {
	    width: 50% !important; flex: 0 0 50% !important; max-width: 50% !important;
	  }
	  .filter-card .col-12 {
	    width: 100% !important; flex: 0 0 100% !important; max-width: 100% !important;
	  }
	}

	@media screen and (max-width: 400px) {
	  .event-header .event-name { font-size: 15px; }
	  .item-heading { font-size: 12px; }
	}

	/* ── Desktop ≥ 768px ── */
	@media screen and (min-width: 768px) {
	  .page-wrapper { padding-bottom: 72px; }
	}

</style>
</head>
<body>

<!-- ── FAB ── -->
<div class="scroll-fab" id="scrollFab" aria-label="Page navigation">
  <button id="fabTop" onclick="smoothScroll('top')" title="Scroll to top" aria-label="Scroll to top">
    <i class="fas fa-chevron-up"></i>
  </button>
  <button id="fabBottom" onclick="smoothScroll('bottom')" title="Scroll to bottom" aria-label="Scroll to bottom">
    <i class="fas fa-chevron-down"></i>
  </button>
</div>

<div class="page-wrapper mt-2">

  <!-- ── Event Header ── -->
  <div class="event-header">
    <div class="event-name">FINAL RESULT</div>
    <div class="event-name" th:text="${eventRecord.eventName}">Event Name</div>
    <div class="event-host" th:text="${eventRecord.hostNodeName}">Host Organisation</div>
    <div class="event-meta">
      <span>
        <i class="fas fa-calendar-alt"></i>
        <span th:text="${#temporals.format(eventRecord.eventPeriodStart,'dd MMM yyyy')}"></span>
        &nbsp;–&nbsp;
        <span th:text="${#temporals.format(eventRecord.eventPeriodEnd,'dd MMM yyyy')}"></span>
      </span>
      <span>
        <i class="fas fa-map-marker-alt"></i>
        <span th:text="${eventRecord.eventVenue}"></span>
      </span>
      <span>
        <i class="fas fa-phone"></i>
        <span th:text="${eventRecord.eventOfficialPhone}"></span>
      </span>
      <span>
        <i class="fas fa-hashtag"></i>
        Year&nbsp;<span th:text="${eventRecord.eventYear}"></span>
      </span>
    </div>
  </div>

  <!-- ── Filter ── -->
  <form id="search-form" method="GET">
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px;">

      <div>
        <div class="filter-label">Item</div>
        <select name="itemId" class="form-select">
          <option value="">All Items</option>
          <option th:each="entry : ${itemsMap}" th:value="${entry.key}"
            th:text="${entry.value}"
            th:selected="${paramx['itemId']} == ${entry.key.toString()}"></option>
        </select>
      </div>

      <div>
        <div class="filter-label">Gender</div>
        <select name="gender" class="form-select">
          <option value="">All</option>
          <option th:each="g : ${genders}" th:value="${g}" th:text="${g}"
            th:selected="${paramx['gender']} == ${g.name()}"></option>
        </select>
      </div>

      <div>
        <div class="filter-label">Category</div>
        <select name="category" class="form-select">
          <option value="">All</option>
          <option th:each="c : ${categories}" th:value="${c}" th:text="${c}"
            th:selected="${paramx['category']} == ${c.name()}"></option>
        </select>
      </div>

      <div style="display:flex; gap:8px; align-items:flex-end;">
        <button type="submit" class="btn btn-primary flex-fill">
          <i class="fas fa-search me-1"></i> Search
        </button>
        <button type="button" class="btn btn-outline-secondary flex-fill" onclick="showAll()">
          <i class="fas fa-list me-1"></i> All
        </button>
      </div>

    </div>
  </form>

  <!-- ── Print Button ── -->
  <div class="no-print mb-3">
    <button class="btn btn-outline-dark btn-print" onclick="window.print()">
      <i class="fas fa-print me-1"></i> Print Report
    </button>
  </div>

  <!-- ══════════════════════════════════
       DATA BLOCKS
  ══════════════════════════════════ -->
  <div th:each="itemEntry, itemStat : ${matrix}" class="item-block mb-4">

    <!-- ITEM HEADER -->
    <div class="item-heading">
      <div class="d-flex align-items-center gap-2 overflow-hidden">
        <i class="fas fa-tag flex-shrink-0"></i>
        <span class="text-truncate" th:text="${itemEntry.key}"></span>
      </div>
      <span class="badge"
            th:text="${'Item ' + itemStat.count + ' / ' + itemStat.size}">
      </span>
    </div>

    <div class="gender-block mt-3" th:each="genderEntry, genderStat : ${itemEntry.value}">

      <!-- GENDER HEADER -->
      <div class="gender-heading">
        <span th:text="${genderEntry.key}"></span>
        <span class="badge bg-primary"
              th:text="${'Gender ' + genderStat.count + ' of ' + genderStat.size}">
        </span>
      </div>

      <div th:each="catEntry, catStat : ${genderEntry.value}" class="mb-4">

        <!-- CATEGORY HEADER -->
        <div class="category-heading">
          <div class="d-flex align-items-center gap-2 overflow-hidden flex-fill">
            <i class="fas fa-layer-group text-secondary flex-shrink-0"></i>
            <span class="text-truncate" th:text="${catEntry.key}"></span>
            <small class="text-muted flex-shrink-0"
                   th:text="${'[' + itemStat.count + '.' + genderStat.count + '.' + catStat.count + ']'}">
            </small>
          </div>
          <span class="badge bg-success flex-shrink-0"
                th:text="${#lists.size(catEntry.value) + ' Entries'}">
          </span>
        </div>

        <!-- RESULT TABLE -->
        <div class="table-responsive shadow-sm rounded border overflow-hidden">
          <table class="table table-bordered table-hover mb-0 result-table">
            <thead class="table-dark">
              <tr>
                <th style="width:80px;" class="text-center">Chest No.</th>
                <th style="width:220px;">Participant</th>
                <th style="width:130px;" class="text-center">Judge Scores</th>
                <th style="width:80px;" class="text-center">Final</th>
                <th style="width:90px;" class="text-center">Grade</th>
                <th style="width:100px;" class="text-center">Status</th>
                <th style="width:110px;" class="text-center">Certificate</th>
              </tr>
            </thead>

            <tbody>
              <tr th:each="mei : ${catEntry.value}">

                <!-- Chest -->
                <td class="chest-no"
                    th:text="${mei.memberChestNo}">
                </td>

                <!-- Participant -->
                <td>
                  <div class="participant-name">
                    <span th:text="${mei.memberEventMember.userFname}"></span>
                    <span th:text="${mei.memberEventMember.userLname}"></span>
                  </div>
                  <div class="participant-meta">
                    DOB: <span th:text="${#temporals.format(mei.memberEventMember.userDob, 'dd-MM-yyyy')}"></span>
                  </div>
                  <div class="participant-meta">
                    Kalari: <span th:text="${mei.memberEventNode.nodeName}"></span>
                  </div>
                </td>

                <!-- Judge Scores -->
                <td class="judge-stack">
                  <div>J1: <span th:text="${mei.memberScore1}"></span></div>
                  <div>J2: <span th:text="${mei.memberScore2}"></span></div>
                  <div>J3: <span th:text="${mei.memberScore3}"></span></div>
                </td>

                <!-- Final Score -->
                <td>
                  <span class="score-pill final-score"
                        th:text="${mei.memberEventScore}">
                  </span>
                </td>

                <!-- Grade -->
                <td class="text-center">
                  <span class="grade-pill"
                        th:text="${mei.memberEventGrade != null ? mei.memberEventGrade : '-'}">
                  </span>
                </td>

                <!-- Verification Status -->
                <td class="text-center">
                  <span th:if="${mei.verificationStatus?.name() == 'APPROVED'}"
                        class="badge bg-success">Approved</span>
                  <span th:if="${mei.verificationStatus?.name() != 'APPROVED'}"
                        class="badge bg-warning text-dark">Pending</span>
                </td>

                <!-- Certificate -->
                <td class="text-center">

                  <!-- Status badge: visible always, including print -->
                  <span th:if="${mei.certificateStatus?.name() == 'GENERATED'}"
                        class="badge bg-primary">Generated</span>
                  <span th:if="${mei.certificateStatus?.name() != 'GENERATED'}"
                        class="badge bg-secondary">Pending</span>

                  <!-- Action buttons: screen only, hidden from print -->
                  <div class="no-print mt-1 d-flex gap-1 justify-content-center flex-wrap">

                    <!-- View: approved but not yet generated, with privilege -->
                    <a th:if="${mei.certificateStatus?.name() != 'GENERATED'
                               and mei.verificationStatus?.name() == 'APPROVED'
                               and #authorization.expression('hasAuthority(''PRIV_champ_participants_certificate'')')}"
                       th:href="@{/champ_participants_certificate/{id}(id=${xorMaskHelper.mask(mei.meiId)})}"
                       onclick="openCertificatePreview(this.href); return false;"
                       class="btn btn-sm btn-outline-primary">
                      <i class="fa fa-eye me-1"></i> View
                    </a>

                    <!-- Download: certificate already generated -->
                    <a th:if="${mei.certificateStatus?.name() == 'GENERATED'}"
                       th:href="@{'/files/certificate/' + ${xorMaskHelper.mask(mei.meiId)}}"
                       download
                       class="btn btn-sm btn-outline-success">
                      <i class="fa fa-download me-1"></i> PDF
                    </a>

                  </div>

                </td>

              </tr>
            </tbody>
          </table>
        </div>

        <!-- Signature Footer -->
        <div class="tab-footer no-print">
          <div class="footer-box">
            <div class="sign-line"></div>
            <div class="sign-label">Tabulation Officer Signature</div>
          </div>
          <div class="footer-box">
            <div class="sign-line"></div>
            <div class="sign-label">Chief Judge Signature</div>
          </div>
        </div>

        <div class="page-break-after"></div>

      </div><!-- end catEntry -->
    </div><!-- end genderEntry -->
  </div><!-- end itemEntry -->

  <!-- Print timestamp -->
  <div class="print-time text-center text-muted mt-3" style="font-size:11px;">
    Printed on:
    <span th:text="${#temporals.format(#temporals.createNow(), 'dd-MM-yyyy hh:mm a')}"></span>
  </div>

</div><!-- end page-wrapper -->

<script>
function openCertificatePreview(url) {
  const w = 1200, h = 700;
  const left = (screen.width / 2) - (w / 2);
  const top  = (screen.height / 2) - (h / 2);
  const popup = window.open(
    url, 'certificatePreview',
    `width=${w},height=${h},top=${top},left=${left},resizable=yes,scrollbars=yes`
  );
  if (popup) popup.focus();
}

function showAll() {
  const form = document.getElementById('search-form');
  form.querySelectorAll('input, select').forEach(el => el.value = '');
  form.submit();
}

function smoothScroll(dir) {
  const target = dir === 'top' ? 0 : document.body.scrollHeight;
  window.scrollTo({ top: target, behavior: 'smooth' });
}

(function () {
  var fab = document.getElementById('scrollFab');

  function getScrollY() {
    return window.scrollY ?? window.pageYOffset
      ?? document.documentElement.scrollTop
      ?? document.body.scrollTop
      ?? 0;
  }

  function updateFab() {
    var y = getScrollY();
    var maxY = document.documentElement.scrollHeight - window.innerHeight;
    fab.classList.toggle('show-top', y > 200);
    var fabBottom = document.getElementById('fabBottom');
    fabBottom.style.display = (maxY > 0 && y >= maxY - 80) ? 'none' : '';
  }

  window.addEventListener('scroll', updateFab, { passive: true });
  document.addEventListener('scroll', updateFab, { passive: true });
  updateFab();
})();
</script>
</body>
</html>
