<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
<title>Chest Number List</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" type="text/css" th:href="@{/css/styles.css}">
<style>
/* ── Base ── */
body { font-family: Arial, sans-serif; font-size: 10pt; color: #333; background: #f5f5f5; }

.page-wrapper { max-width: 900px; margin: 0 auto; padding: 12px 16px; }

/* ── Page title ── */
h2 { font-size: 15pt; font-weight: 700; margin: 0 0 10px; color: #1a1a2e; letter-spacing: .3px; }

/* ── Event header ── */
.event-header {
  background: #fff;
  border: 1px solid #ccc;
  border-radius: 6px;
  padding: 14px 16px 10px;
  margin-bottom: 10px;
}
.event-header .event-name {
  font-size: 16pt; font-weight: 800; color: #1a1a2e;
  margin: 0 0 2px; letter-spacing: .3px;
  text-align: center;
}
.event-header .event-host {
  font-size: 10.5pt; color: #444; margin: 0 0 8px;
}
.event-meta {
  display: flex; flex-wrap: wrap; gap: 6px 20px;
  font-size: 9pt; color: #555;
  border-top: 1px solid #e0e0e0; padding-top: 8px;
}
.event-meta span i { margin-right: 4px; opacity: .7; }

/* ── Filter card ── */
.filter-card { background: #fff; border: 1px solid #ddd; border-radius: 6px; padding: 10px 12px; margin-bottom: 10px; }
.filter-card .form-select, .filter-card .form-control { font-size: 9pt; padding: 4px 8px; height: 30px; border-radius: 4px; }
.filter-card .btn { font-size: 9pt; padding: 4px 12px; height: 30px; border-radius: 4px; }
.filter-card .row { --bs-gutter-x: 8px; --bs-gutter-y: 6px; }

/* ── Print button ── */
.btn-print { font-size: 9pt; padding: 4px 14px; margin-bottom: 8px; border-radius: 4px; }

/* ── Item block ── */
.item-block { background: #fff; border: 1px solid #ccc; border-radius: 6px; margin-bottom: 12px; overflow: hidden; }

.item-heading {
  color: #1a1a2e; background : #fff;
  font-size: 11pt; font-weight: 700;
  padding: 6px 12px;
  letter-spacing: .2px;
}

.gender-block { padding: 0 12px 8px; }

.gender-heading {
  font-size: 10pt; font-weight: 700; color: #1a1a2e;
  padding: 6px 0 2px;
  border-bottom: 1.5px solid #1a1a2e;
  margin-bottom: 4px;
}

.category-heading {
  font-size: 9.5pt; font-weight: 700; color: #444;
  margin: 6px 0 3px;
}

/* ── Tables ── */
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 9pt;
  margin-bottom: 4px;
  table-layout: fixed;
}

th, td { border: 1px solid #bbb; padding: 3px 8px; text-align: left; vertical-align: middle; }
th { background: #eef0f5; font-weight: 700; color: #1a1a2e; font-size: 8.5pt; padding: 4px 8px; }

td.chest-no { width: 90px; text-align: center; font-size: 13pt; font-weight: 800; color: #1a1a2e; }
td.participant { width: 45%; }

tbody tr:nth-child(even) { background: #f9f9fc; }
tbody tr:hover { background: #eef2ff; }

/* ── Print ── */
.print-only { display: none; }

@media print {
  @page { margin: 0.4in; size: letter; }

  * { overflow: visible !important; }

  body { background: #fff !important; font-size: 9pt; color: #000; }
  .page-wrapper { padding: 0; max-width: 100%; }
  .no-print, #filter_section { display: none !important; }

  /* ── Event header print ── */
  .event-header {
    background: none !important;
    border: none !important;
    border-bottom: 2px solid #000 !important;
    border-radius: 0 !important;
    padding: 0 0 8px !important;
    margin-bottom: 10px;
  }
  .event-header .event-name { font-size: 15pt; color: #000 !important; }
  .event-header .event-host { color: #333 !important; }
  .event-meta { border-top: 1px solid #999; color: #333 !important; }

  /* strip all box model that causes stacking context */
  .item-block {
    background: none !important;
    border: none !important;
    border-radius: 0 !important;
    box-shadow: none !important;
    overflow: visible !important;
    margin-bottom: 4px;
    break-inside: auto;
    page-break-inside: auto;
  }

  .item-heading {
    background: none !important;
    color: #000 !important;
    border-bottom: 2px solid #000 !important;
    padding-left: 0 !important;
    break-after: avoid;
    page-break-after: avoid;
    border-radius: 0 !important;
  }

  .gender-block {
    overflow: visible !important;
    break-inside: auto;
    page-break-inside: auto;
  }

  .gender-heading {
    break-after: avoid;
    page-break-after: avoid;
  }

  .category-heading {
    break-after: avoid;
    page-break-after: avoid;
  }

  table {
    font-size: 8.5pt;
    border-collapse: collapse !important;
    break-inside: auto;
    page-break-inside: auto;
    width: 100%;
  }

  th {
    background: #e0e0e0 !important;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  thead { display: table-header-group; }

  tbody {
    break-inside: auto;
    page-break-inside: auto;
  }

  tr {
    break-inside: avoid;
    page-break-inside: avoid;
    break-after: auto;
    page-break-after: auto;
  }

  td, th {
    overflow: visible !important;
  }

  .print-only { display: block; margin-top: 16px; text-align: center; font-size: 9pt; color: #666; }
}

/* ── Mobile ── */
@media (max-width: 600px) {
  .filter-card .col-md-3 { flex: 0 0 100%; max-width: 100%; }
  td.chest-no { font-size: 11pt; }
  .event-meta { flex-direction: column; gap: 4px; }
}


.custom-score-table thead th{
    font-size: 13px;
    letter-spacing: .4px;
    vertical-align: middle;
}

.custom-score-table tbody td{
    vertical-align: middle;
    font-size: 13px;
}

.custom-score-table tbody tr:hover{
    background: #f8fafc;
    transition: .2s ease;
}

.item-heading{
    background: #fff;
    color: black;
    padding: 12px 16px;
    border-radius: 10px;
    font-weight: 700;
    font-size: 15px;
}

.gender-heading{
    background: #eff6ff;
    color: #1d4ed8;
    padding: 10px 14px;
    border-left: 5px solid #2563eb;
    border-radius: 8px;
    margin-bottom: 12px;
    font-weight: 700;
}

.category-heading{
    background: #f9fafb;
    padding: 10px 14px;
    border-radius: 8px;
    border: 1px solid #e5e7eb;
    margin-bottom: 10px;
    font-weight: 600;
}

.score-pill{
    background: #dbeafe;
    color: #1d4ed8;
    padding: 5px 12px;
    border-radius: 30px;
    font-weight: 700;
    min-width: 55px;
    display: inline-block;
}

.grade-pill{
    background: #ecfdf5;
    color: #047857;
    padding: 5px 12px;
    border-radius: 30px;
    font-weight: 700;
    min-width: 55px;
    display: inline-block;
}

.participant{
    font-weight: 600;
}

@media(max-width:768px){

    .custom-score-table{
        min-width: 650px;
    }

    .item-heading,
    .gender-heading,
    .category-heading{
        font-size: 13px;
    }
}

.summary-bar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;

    padding:10px 14px;

    background:#f8fafc;

    border:1px solid #e5e7eb;
    border-radius:8px;

    overflow-x:auto;
    white-space:nowrap;
}

.summary-item{
    display:flex;
    align-items:center;
    gap:6px;

    font-size:13px;
    flex-shrink:0;
}

.summary-label{
    font-weight:700;
    color:#64748b;
    text-transform:uppercase;
    font-size:11px;
    letter-spacing:.5px;
}

.summary-value{
    font-weight:600;
    color:#111827;
}

.total-box{
    margin-left:auto;

    background:#dbeafe;
    color:#1d4ed8;

    padding:4px 12px;
    border-radius:30px;
}
</style>
</head>
<body>
<div class="page-wrapper mt-3">

  <!-- ── Event Header ── -->
  <div class="event-header">
	<div class="event-name">LIST OF PARTICIPANTS</div>
    <div class="event-name" th:text="${eventRecord.eventName}">Event Name</div>
    <div class="event-host" th:text="${eventRecord.hostNodeName}">Host Organisation</div>
    <div class="event-meta">
      <span>
        <i class="fas fa-calendar-alt"></i>
        <span th:text="${#temporals.format(eventRecord.eventPeriodStart,'dd MMM yyyy')}"></span>
        &nbsp;–&nbsp;
        <span th:text="${#temporals.format(eventRecord.eventPeriodEnd,'dd MMM yyyy')}"></span>
      </span>
      <span>
        <i class="fas fa-map-marker-alt"></i>
        <span th:text="${eventRecord.eventVenue}"></span>
      </span>
      <span>
        <i class="fas fa-phone"></i>
        <span th:text="${eventRecord.eventOfficialPhone}"></span>
      </span>
      <span>
        <i class="fas fa-hashtag"></i>
        Year&nbsp;<span th:text="${eventRecord.eventYear}"></span>
      </span>
    </div>
  </div>

  <!-- Filter -->
  <div class="filter-card" id="filter_section">
    <form id="search-form" method="GET">
      <div class="row align-items-end">
        <div class="col-12 col-md-3">
          <select name="itemId" class="form-select">
            <option value="">-- Item --</option>
            <option th:each="entry : ${itemsMap}" th:value="${entry.key}"
              th:text="${entry.value}"
              th:selected="${paramx['itemId']} == ${entry.key.toString()}"></option>
          </select>
        </div>
        <div class="col-12 col-md-3">
          <select name="gender" class="form-select">
            <option value="">-- Gender --</option>
            <option th:each="g : ${genders}" th:value="${g}" th:text="${g}"
              th:selected="${paramx['gender']} == ${g.name()}"></option>
          </select>
        </div>
        <div class="col-12 col-md-3">
          <select name="category" class="form-select">
            <option value="">-- Category --</option>
            <option th:each="c : ${categories}" th:value="${c}" th:text="${c}"
              th:selected="${paramx['category']} == ${c.name()}"></option>
          </select>
        </div>
        <div class="col-12 col-md-3">
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary flex-fill">
              <i class="fas fa-search me-1"></i> Search
            </button>
            <button type="button" class="btn btn-secondary flex-fill" onclick="showAll()">
              <i class="fas fa-list me-1"></i> All
            </button>
          </div>
        </div>
      </div>
    </form>
  </div>

  <!-- Print button -->
  <div class="no-print">
    <button class="btn btn-outline-dark btn-print" onclick="window.print()">
      <i class="fas fa-print me-1"></i> Print Report
    </button>
  </div>


  <!-- Data -->
  <div th:each="itemEntry, itemStat : ${matrix}" class="item-block mb-5">

      <!-- ITEM HEADER -->
      <div class="item-heading d-flex justify-content-between align-items-center">
          <div>
              <i class="fas fa-tag me-1"></i>
              <span th:text="${itemEntry.key}"></span>
          </div>
          <span class="badge bg-primary fs-6"
                th:text="${'Item ' + itemStat.count + ' of ' + itemStat.size}">
          </span>
      </div>

      <div class="gender-block mt-4"
           th:each="genderEntry, genderStat : ${itemEntry.value}">

          <!-- GENDER HEADER -->
          <div class="gender-heading d-flex justify-content-between align-items-center">
              <span th:text="${genderEntry.key}"></span>
              <span class="badge bg-secondary"
                    th:text="${'Gender ' + genderStat.count + ' of ' + genderStat.size}">
              </span>
          </div>

          <div th:each="catEntry, catStat : ${genderEntry.value}" class="mb-4">

              <!-- CATEGORY HEADER -->
              <div class="category-heading d-flex justify-content-between align-items-center">
                  <div>
                      <i class="fas fa-layer-group me-1"></i>
                      <span th:text="${catEntry.key}"></span>
                      <small class="text-muted ms-2"
                             th:text="${'[' + itemStat.count + '.' + genderStat.count + '.' + catStat.count + ']'}">
                      </small>
                  </div>
                  <span class="badge bg-success"
                        th:text="${#lists.size(catEntry.value) + ' Entries'}">
                  </span>
              </div>

              <!-- TABLE -->
              <div class="table-responsive shadow-sm rounded border overflow-hidden">
                  <table class="table table-bordered table-hover mb-0 custom-score-table">
                      <thead class="table-dark">
                          <tr>
                              <th width="60">SL</th>
                              <th>Participant</th>
                              <th>Kalari</th>
                              <th width="100" class="text-center">Score</th>
                              <th width="120" class="text-center">Grade</th>
                          </tr>
                      </thead>
                      <tbody>
                          <tr th:each="mei, stat : ${catEntry.value}">
                              <td class="fw-bold text-muted" th:text="${stat.count}"></td>
                              <td class="participant">
                                  <span th:text="${mei.memberEventMember.userFname}"></span>
                                  <span th:text="${mei.memberEventMember.userLname}"></span>
                              </td>
                              <td>
                                  <span class="text-dark px-3 py-2"
                                        th:text="${mei.memberEventNode.nodeName}">
                                  </span>
                              </td>
                              <td class="text-center">
                                  <span class="score-pill"
                                        th:text="${mei.memberEventScore != 0 ? mei.memberEventScore : '-'}">
                                  </span>
                              </td>
                              <td class="text-center">
                                  <span class="grade-pill"
                                        th:text="${mei.memberEventGrade != null ? mei.memberEventGrade : '-'}">
                                  </span>
                              </td>
                          </tr>
                      </tbody>
                  </table>
              </div>

              <!-- CATEGORY SUMMARY BAR -->
              <div class="summary-bar mt-2">
                  <div class="summary-item">
                      <span class="summary-label">Item</span>
                      <span class="summary-value" th:text="${itemEntry.key}"></span>
                  </div>
                  <div class="summary-item">
                      <span class="summary-label">Gender</span>
                      <span class="summary-value" th:text="${genderEntry.key}"></span>
                  </div>
                  <div class="summary-item">
                      <span class="summary-label">Category</span>
                      <span class="summary-value" th:text="${catEntry.key}"></span>
                  </div>
                  <div class="summary-item total-box">
                      <span class="summary-label">Total</span>
                      <span class="summary-value fw-bold"
                            th:text="${#lists.size(catEntry.value)}">
                      </span>
                  </div>
              </div>

          </div><!-- end catEntry -->

      </div><!-- end genderEntry -->

  </div><!-- end itemEntry -->
  
  
  <!-- ═══════════════════════════════════════════ -->
  <!-- COMPREHENSIVE SUMMARY                        -->
  <!-- ═══════════════════════════════════════════ -->
  <div class="card mt-4 border-0 shadow-sm">
      <div class="card-header bg-dark text-white fw-bold py-2">
          <i class="fas fa-chart-bar me-2"></i> Participation Summary
      </div>
      <div class="card-body p-3">

          <!-- TOP METRICS -->
          <div class="row g-2 mb-3">
              <div class="col-6 col-md-3">
                  <div class="summary-tile bg-primary text-white rounded p-2 text-center">
                      <div class="tile-label">Total Participations</div>
                      <div class="tile-value" th:text="${totalParticipations}"></div>
                  </div>
              </div>
              <div class="col-6 col-md-3">
                  <div class="summary-tile bg-success text-white rounded p-2 text-center">
                      <div class="tile-label">Unique Participants</div>
                      <div class="tile-value" th:text="${uniqueParticipants}"></div>
                  </div>
              </div>
              <div class="col-6 col-md-3">
                  <div class="summary-tile bg-info text-white rounded p-2 text-center">
                      <div class="tile-label">Unique Males</div>
                      <div class="tile-value" th:text="${uniqueMales}"></div>
                  </div>
              </div>
              <div class="col-6 col-md-3">
                  <div class="summary-tile bg-warning text-dark rounded p-2 text-center">
                      <div class="tile-label">Unique Females</div>
                      <div class="tile-value" th:text="${uniqueFemales}"></div>
                  </div>
              </div>
          </div>

          <!-- BREAKDOWN TABLE -->
          <div class="table-responsive">
              <table class="table table-sm table-bordered mb-0" style="font-size:11px; line-height:1.3;">
                  <thead class="table-dark">
                      <tr>
                          <th>Item</th>
                          <th>Gender</th>
                          <th>Category</th>
                          <th class="text-center">Count</th>
                      </tr>
                  </thead>
                  <tbody>
                      <tr th:each="row : ${breakdownRows}"
                          th:classappend="${row['subtotal']} ? 'table-secondary fw-bold' : ''">
                          <td th:text="${row['item']}"></td>
                          <td th:text="${row['gender']}"></td>
                          <td th:text="${row['category']}"></td>
                          <td class="text-center fw-bold" th:text="${row['count']}"></td>
                      </tr>
                  </tbody>
                  <tfoot class="table-dark">
                      <tr>
                          <td colspan="3" class="fw-bold text-end pe-3">Grand Total</td>
                          <td class="text-center fw-bold" th:text="${totalParticipations}"></td>
                      </tr>
                  </tfoot>
              </table>
          </div>

      </div>
  </div>

  <style>
  .summary-tile .tile-label { font-size: 12px; opacity: 0.85; }
  .summary-tile .tile-value  { font-size: 28px; font-weight: 700; line-height: 1.2; }
  </style>

  <div class="print-time">
    Printed on:
    <span th:text="${#temporals.format(#temporals.createNow(), 'dd-MM-yyyy hh:mm a')}"></span>
  </div>

</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
  const first = document.querySelector('.item-block');
  if (first) first.classList.add('first-item');
});

function showAll() {
  const form = document.getElementById('search-form');
  form.querySelectorAll('input, select').forEach(el => el.value = '');
  form.submit();
}
</script>
</body>
</html>
