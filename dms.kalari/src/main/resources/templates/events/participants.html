<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
<title>Chest Number List</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" type="text/css" th:href="@{/css/styles.css}">
<style>
/* ── Variables ── */
:root {
  --primary: #1a1a2e;
  --accent: #2563eb;
  --accent-light: #dbeafe;
  --success: #047857;
  --success-light: #ecfdf5;
  --surface: #fff;
  --bg: #f1f5f9;
  --border: #e2e8f0;
  --text-main: #111827;
  --text-muted: #64748b;
  --radius: 12px;
  --radius-sm: 8px;
}

/* ── Reset / Base ── */
*, *::before, *::after { box-sizing: border-box; }
body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  font-size: 14px;
  color: var(--text-main);
  background: var(--bg);
  margin: 0;
  -webkit-font-smoothing: antialiased;
}

/* ── Wrapper ── */
.page-wrapper {
  max-width: 960px;
  margin: 0 auto;
  padding: 16px 12px 32px;
}

/* ── Page title ── */
h2 { font-size: 18px; font-weight: 700; margin: 0 0 12px; color: var(--primary); }

/* ══════════════════════════════════
   EVENT HEADER
══════════════════════════════════ */
.event-header {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 16px 14px;
  margin-bottom: 14px;
  box-shadow: 0 1px 4px rgba(0,0,0,.05);
}
.event-header .event-title-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 4px;
}
.event-header .event-name {
  font-size: 20px;
  font-weight: 800;
  color: var(--primary);
  margin: 0 0 2px;
  line-height: 1.2;
}
.event-header .event-host {
  font-size: 13px;
  color: var(--text-muted);
  margin: 0 0 12px;
}
.event-meta {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px 12px;
  border-top: 1px solid var(--border);
  padding-top: 10px;
}
.event-meta-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--text-muted);
}
.event-meta-item i {
  color: var(--accent);
  width: 14px;
  flex-shrink: 0;
}

/* ══════════════════════════════════
   FILTER CARD
══════════════════════════════════ */
.filter-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  margin-bottom: 14px;
  box-shadow: 0 1px 4px rgba(0,0,0,.04);
}
.filter-card .form-select,
.filter-card .form-control {
  font-size: 13px;
  padding: 8px 10px;
  border-radius: var(--radius-sm);
  border-color: var(--border);
  height: auto;
}
.filter-card .btn {
  font-size: 13px;
  padding: 8px 14px;
  border-radius: var(--radius-sm);
  height: auto;
}
.filter-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: .6px;
  margin-bottom: 4px;
}

/* ══════════════════════════════════
   PRINT BUTTON
══════════════════════════════════ */
.btn-print {
  font-size: 13px;
  padding: 8px 16px;
  margin-bottom: 14px;
  border-radius: var(--radius-sm);
}

/* ══════════════════════════════════
   ITEM BLOCK
══════════════════════════════════ */
.item-block {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 20px;
  overflow: hidden;
  box-shadow: 0 1px 6px rgba(0,0,0,.06);
}

.item-heading {
  background: var(--primary);
  color: #fff;
  padding: 12px 16px;
  font-size: 14px;
  font-weight: 700;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 8px;
}
.item-heading .badge {
  font-size: 11px;
  font-weight: 600;
  background: rgba(255,255,255,.2) !important;
  color: #fff;
  white-space: nowrap;
}

/* ══════════════════════════════════
   GENDER BLOCK
══════════════════════════════════ */
.gender-block {
  padding: 12px 14px 8px;
}

.gender-heading {
  background: #eff6ff;
  color: #1d4ed8;
  padding: 10px 14px;
  border-left: 4px solid #2563eb;
  border-radius: var(--radius-sm);
  margin-bottom: 12px;
  font-weight: 700;
  font-size: 13px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.gender-heading .badge {
  font-size: 11px;
  background: #2563eb !important;
}

/* ══════════════════════════════════
   CATEGORY HEADING
══════════════════════════════════ */
.category-heading {
  background: #f8fafc;
  padding: 9px 14px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  margin-bottom: 10px;
  font-weight: 600;
  font-size: 13px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 6px;
}
.category-heading .badge {
  font-size: 11px;
  white-space: nowrap;
}

/* ══════════════════════════════════
   TABLE (desktop)
══════════════════════════════════ */
.custom-score-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
  margin-bottom: 0;
}
.custom-score-table thead th {
  font-size: 12px;
  font-weight: 700;
  letter-spacing: .4px;
  vertical-align: middle;
  padding: 10px 12px;
  white-space: nowrap;
}
.custom-score-table tbody td {
  vertical-align: middle;
  padding: 10px 12px;
  font-size: 13px;
  border-color: var(--border);
}
.custom-score-table tbody tr:hover { background: #f8fafc; }

/* ══════════════════════════════════
   MOBILE CARDS (replaces table rows on small screens)
══════════════════════════════════ */
.participant-cards { display: none; }

.participant-card {
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  margin-bottom: 8px;
  background: #fff;
  position: relative;
}
.participant-card:last-child { margin-bottom: 0; }

.participant-card .pc-sl {
  position: absolute;
  top: 10px;
  right: 12px;
  font-size: 10px;
  color: var(--text-muted);
  font-weight: 600;
}
.participant-card .pc-name {
  font-size: 14px;
  font-weight: 700;
  color: var(--text-main);
  margin-bottom: 3px;
  padding-right: 28px;
}
.participant-card .pc-kalari {
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 5px;
}
.participant-card .pc-kalari i { color: var(--accent); font-size: 11px; }
.participant-card .pc-pills {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.participant-card .pc-pill-label {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .5px;
  color: var(--text-muted);
  display: block;
  margin-bottom: 2px;
}

/* ══════════════════════════════════
   PILLS
══════════════════════════════════ */
.score-pill {
  background: var(--accent-light);
  color: #1d4ed8;
  padding: 4px 12px;
  border-radius: 30px;
  font-weight: 700;
  font-size: 12px;
  min-width: 50px;
  display: inline-block;
  text-align: center;
}
.grade-pill {
  background: var(--success-light);
  color: var(--success);
  padding: 4px 12px;
  border-radius: 30px;
  font-weight: 700;
  font-size: 12px;
  min-width: 50px;
  display: inline-block;
  text-align: center;
}
.participant { font-weight: 600; }

/* ══════════════════════════════════
   SUMMARY BAR
══════════════════════════════════ */
.summary-bar {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 8px 16px;
  padding: 10px 14px;
  background: #f8fafc;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  margin-top: 10px;
}
.summary-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
}
.summary-label {
  font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  font-size: 10px;
  letter-spacing: .5px;
}
.summary-value { font-weight: 600; color: var(--text-main); }
.total-box {
  margin-left: auto;
  background: var(--accent-light);
  color: #1d4ed8;
  padding: 4px 12px;
  border-radius: 30px;
}


/* =========================
   Participation Summary
========================= */

.participation-summary-wrapper {
    width: 100%;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    margin-top: 15px;
}

.participation-summary-wrapper table {
    min-width: 900px; /* prevents crushed columns */
}

@media (max-width: 768px) {

    .participation-summary-wrapper {
        border: 1px solid #ddd;
        border-radius: 6px;
        background: #fff;
    }

    .participation-summary-wrapper table {
        font-size: 12px;
    }

    .participation-summary-wrapper th,
    .participation-summary-wrapper td {
        white-space: nowrap;
        padding: 6px 8px !important;
    }

    .participation-summary-title {
        font-size: 18px;
        line-height: 1.3;
    }
}

/* =========================
   PRINT SUPPORT
========================= */

@media print {

    .page-break-before {
        page-break-before: always;
        break-before: page;
    }

    .participation-summary-wrapper {
        overflow: visible !important;
    }

    .participation-summary-wrapper table {
        width: 100% !important;
        min-width: 100% !important;
    }
}

/* ══════════════════════════════════
   COMPREHENSIVE SUMMARY CARD
══════════════════════════════════ */
.summary-tile .tile-label { font-size: 11px; opacity: .85; margin-bottom: 2px; }
.summary-tile .tile-value { font-size: 28px; font-weight: 800; line-height: 1.1; }

/* ══════════════════════════════════
   PRINT
══════════════════════════════════ */
.print-only { display: none; }

@media print {
  @page { margin: 0.4in; size: letter; }
  * { overflow: visible !important; }
  body { background: #fff !important; font-size: 9pt; color: #000; }
  .page-wrapper { padding: 0; max-width: 100%; }
  .no-print, #filter_section { display: none !important; }
  .event-header { background: none !important; border: none !important; border-bottom: 2px solid #000 !important; border-radius: 0 !important; padding: 0 0 8px !important; margin-bottom: 10px; box-shadow: none !important; }
  .item-block { background: none !important; border: none !important; border-radius: 0 !important; box-shadow: none !important; overflow: visible !important; break-inside: auto; }
  .item-heading { background: var(--primary) !important; color: #fff !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; border-radius: 0 !important; break-after: avoid; }
  .gender-block { overflow: visible !important; break-inside: auto; }
  .gender-heading, .category-heading { break-after: avoid; }
  table { font-size: 8.5pt; border-collapse: collapse !important; break-inside: auto; }
  th { background: #e0e0e0 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  thead { display: table-header-group; }
  tr { break-inside: avoid; break-after: auto; }
  .print-only { display: block; margin-top: 16px; text-align: center; font-size: 9pt; color: #666; }
  /* Always show table in print, hide cards */
  .table-responsive { display: block !important; }
  .participant-cards { display: none !important; }
}

/* ══════════════════════════════════
   RESPONSIVE BREAKPOINTS
══════════════════════════════════ */
@media (max-width: 767px) {
  .page-wrapper { padding: 12px 10px 28px; }

  .event-header { padding: 14px 13px 12px; }
  .event-header .event-name { font-size: 17px; }
  .event-meta { grid-template-columns: 1fr; gap: 5px; }

  /* Filter stacks vertically */
  .filter-card .col-md-3 { width: 100%; }
  .filter-card .row { gap: 8px 0; }

  /* Hide desktop table, show cards */
  .table-responsive { display: none !important; }
  .participant-cards { display: block; }

  .item-heading { font-size: 13px; padding: 11px 13px; }
  .gender-block { padding: 10px 11px 6px; }
  .gender-heading { font-size: 12px; padding: 8px 12px; }
  .category-heading { font-size: 12px; padding: 8px 12px; }

  .summary-bar { gap: 6px 12px; }
  .total-box { margin-left: 0; }

  /* Summary tiles 2x2 on phone */
  .summary-tile .tile-value { font-size: 22px; }
  .summary-tile .tile-label { font-size: 10px; }
}

@media (min-width: 768px) {
  .participant-cards { display: none !important; }
  .table-responsive { display: block !important; }
}

@media (max-width: 400px) {
  .event-header .event-name { font-size: 15px; }
  .item-heading { font-size: 12px; }
}
</style>
</head>
<body>
<div class="page-wrapper mt-2">

  <!-- ── Event Header ── -->
  <div class="event-header">
    <div class="event-title-label">Participants List</div>
    <div class="event-name" th:text="${eventRecord.eventName}">Event Name</div>
    <div class="event-host" th:text="${eventRecord.hostNodeName}">Host Organisation</div>
    <div class="event-meta">
      <div class="event-meta-item">
        <i class="fas fa-calendar-alt"></i>
        <span>
          <span th:text="${#temporals.format(eventRecord.eventPeriodStart,'dd MMM yyyy')}"></span>
          &nbsp;–&nbsp;
          <span th:text="${#temporals.format(eventRecord.eventPeriodEnd,'dd MMM yyyy')}"></span>
        </span>
      </div>
      <div class="event-meta-item">
        <i class="fas fa-map-marker-alt"></i>
        <span th:text="${eventRecord.eventVenue}"></span>
      </div>
      <div class="event-meta-item">
        <i class="fas fa-phone"></i>
        <span th:text="${eventRecord.eventOfficialPhone}"></span>
      </div>
      <div class="event-meta-item">
        <i class="fas fa-hashtag"></i>
        <span>Year&nbsp;<span th:text="${eventRecord.eventYear}"></span></span>
      </div>
    </div>
  </div>

  <!-- ── Filter ── -->
  <div class="filter-card" id="filter_section">
    <form id="search-form" method="GET">
      <div class="row g-2 align-items-end">
        <div class="col-6 col-md-3">
          <div class="filter-label">Item</div>
          <select name="itemId" class="form-select">
            <option value="">All Items</option>
            <option th:each="entry : ${itemsMap}" th:value="${entry.key}"
              th:text="${entry.value}"
              th:selected="${paramx['itemId']} == ${entry.key.toString()}"></option>
          </select>
        </div>
        <div class="col-6 col-md-3">
          <div class="filter-label">Gender</div>
          <select name="gender" class="form-select">
            <option value="">All</option>
            <option th:each="g : ${genders}" th:value="${g}" th:text="${g}"
              th:selected="${paramx['gender']} == ${g.name()}"></option>
          </select>
        </div>
        <div class="col-6 col-md-3">
          <div class="filter-label">Category</div>
          <select name="category" class="form-select">
            <option value="">All</option>
            <option th:each="c : ${categories}" th:value="${c}" th:text="${c}"
              th:selected="${paramx['category']} == ${c.name()}"></option>
          </select>
        </div>
        <div class="col-6 col-md-3">
          <div class="filter-label d-none d-md-block">&nbsp;</div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary flex-fill">
              <i class="fas fa-search me-1"></i> Search
            </button>
            <button type="button" class="btn btn-outline-secondary flex-fill" onclick="showAll()">
              <i class="fas fa-list me-1"></i> All
            </button>
          </div>
        </div>
      </div>
    </form>
  </div>

  <!-- ── Print button ── -->
  <div class="no-print mb-3">
    <button class="btn btn-outline-dark btn-print" onclick="window.print()">
      <i class="fas fa-print me-1"></i> Print Report
    </button>
  </div>

  <!-- ══════════════════════════════════
       DATA BLOCKS
  ══════════════════════════════════ -->
  <div th:each="itemEntry, itemStat : ${matrix}" class="item-block mb-4">

    <!-- ITEM HEADER -->
    <div class="item-heading">
      <div class="d-flex align-items-center gap-2 overflow-hidden">
        <i class="fas fa-tag flex-shrink-0"></i>
        <span class="text-truncate" th:text="${itemEntry.key}"></span>
      </div>
      <span class="badge"
            th:text="${'Item ' + itemStat.count + ' / ' + itemStat.size}">
      </span>
    </div>

    <div class="gender-block mt-3"
         th:each="genderEntry, genderStat : ${itemEntry.value}">

      <!-- GENDER HEADER -->
      <div class="gender-heading">
        <span th:text="${genderEntry.key}"></span>
        <span class="badge bg-primary"
              th:text="${'Gender ' + genderStat.count + ' of ' + genderStat.size}">
        </span>
      </div>

      <div th:each="catEntry, catStat : ${genderEntry.value}" class="mb-4">

        <!-- CATEGORY HEADER -->
        <div class="category-heading">
          <div class="d-flex align-items-center gap-2 overflow-hidden flex-fill">
            <i class="fas fa-layer-group text-secondary flex-shrink-0"></i>
            <span class="text-truncate" th:text="${catEntry.key}"></span>
            <small class="text-muted flex-shrink-0"
                   th:text="${'[' + itemStat.count + '.' + genderStat.count + '.' + catStat.count + ']'}">
            </small>
          </div>
          <span class="badge bg-success flex-shrink-0"
                th:text="${#lists.size(catEntry.value) + ' Entries'}">
          </span>
        </div>

        <!-- ── DESKTOP TABLE ── -->
        <div class="table-responsive shadow-sm rounded border overflow-hidden">
          <table class="table table-bordered table-hover mb-0 custom-score-table">
            <thead class="table-dark">
              <tr>
                <th width="50">SL</th>
                <th>Participant</th>
                <th>Kalari</th>
                <th width="90" class="text-center">Score</th>
                <th width="100" class="text-center">Grade</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="mei, stat : ${catEntry.value}">
                <td class="fw-bold text-muted" th:text="${stat.count}"></td>
				<td class="participant"
				    th:text="${mei.memberEventMember.userFname + ' ' +
				             mei.memberEventMember.userLname +
				             (mei.memberEventTeamCode != null and !#strings.isEmpty(mei.memberEventTeamCode)
				                 ? ' [' + mei.memberEventTeamCode + ']'
				                 : '')}">
				</td>
                <td>
                  <span th:text="${mei.memberEventNode.nodeName}"></span>
                </td>
                <td class="text-center">
                  <span class="score-pill"
                        th:text="${mei.memberEventScore != 0 ? mei.memberEventScore : '-'}">
                  </span>
                </td>
                <td class="text-center">
                  <span class="grade-pill"
                        th:text="${mei.memberEventGrade != null ? mei.memberEventGrade : '-'}">
                  </span>
                </td>
              </tr>
            </tbody>
          </table>
        </div>

        <!-- ── MOBILE CARDS ── -->
        <div class="participant-cards">
          <div th:each="mei, stat : ${catEntry.value}" class="participant-card">
            <span class="pc-sl">#<span th:text="${stat.count}"></span></span>
			<div class="pc-name"
			     th:text="${mei.memberEventMember.userFname + ' ' + 
			              mei.memberEventMember.userLname + 
			              (mei.memberEventTeamCode != null and !#strings.isEmpty(mei.memberEventTeamCode)
			                  ? ' [' + mei.memberEventTeamCode + ']'
			                  : '')}">
			</div>
            <div class="pc-kalari">
              <i class="fas fa-building"></i>
              <span th:text="${mei.memberEventNode.nodeName}"></span>
            </div>
            <div class="pc-pills">
              <div>
                <span class="pc-pill-label">Score</span>
                <span class="score-pill"
                      th:text="${mei.memberEventScore != 0 ? mei.memberEventScore : '-'}">
                </span>
              </div>
              <div>
                <span class="pc-pill-label">Grade</span>
                <span class="grade-pill"
                      th:text="${mei.memberEventGrade != null ? mei.memberEventGrade : '-'}">
                </span>
              </div>
            </div>
          </div>
        </div>

        <!-- SUMMARY BAR -->
        <div class="summary-bar mt-2">
          <div class="summary-item">
            <span class="summary-label">Item</span>
            <span class="summary-value" th:text="${itemEntry.key}"></span>
          </div>
          <div class="summary-item">
            <span class="summary-label">Gender</span>
            <span class="summary-value" th:text="${genderEntry.key}"></span>
          </div>
          <div class="summary-item">
            <span class="summary-label">Category</span>
            <span class="summary-value" th:text="${catEntry.key}"></span>
          </div>
          <div class="summary-item total-box">
            <span class="summary-label">Total</span>
            <span class="summary-value fw-bold"
                  th:text="${#lists.size(catEntry.value)}">
            </span>
          </div>
        </div>

      </div><!-- end catEntry -->
    </div><!-- end genderEntry -->
  </div><!-- end itemEntry -->


  <!-- ══════════════════════════════════
       COMPREHENSIVE SUMMARY
  ══════════════════════════════════ -->
  <div class="page-break-before"></div>

  <div class="card mt-4 border-0 shadow-sm rounded-3 overflow-hidden">
    <div class="card-header bg-dark text-white fw-bold py-2 px-3 d-flex align-items-center gap-2">
      <i class="fas fa-chart-bar"></i> Participation Summary
    </div>
    <div class="card-body p-3">

      <!-- TOP METRICS -->
      <div class="row g-2 mb-3">
        <div class="col-6 col-md-3">
          <div class="summary-tile bg-primary text-white rounded-3 p-2 text-center">
            <div class="tile-label">Total Participations</div>
            <div class="tile-value" th:text="${totalParticipations}"></div>
          </div>
        </div>
        <div class="col-6 col-md-3">
          <div class="summary-tile bg-success text-white rounded-3 p-2 text-center">
            <div class="tile-label">Unique Participants</div>
            <div class="tile-value" th:text="${uniqueParticipants}"></div>
          </div>
        </div>
        <div class="col-6 col-md-3">
          <div class="summary-tile bg-info text-white rounded-3 p-2 text-center">
            <div class="tile-label">Unique Males</div>
            <div class="tile-value" th:text="${uniqueMales}"></div>
          </div>
        </div>
        <div class="col-6 col-md-3">
          <div class="summary-tile bg-warning text-dark rounded-3 p-2 text-center">
            <div class="tile-label">Unique Females</div>
            <div class="tile-value" th:text="${uniqueFemales}"></div>
          </div>
        </div>
      </div>

      <!-- BREAKDOWN TABLE -->
      <div class="table-responsive">
        <table class="table table-sm table-bordered mb-0" style="font-size:12px; line-height:1.4;">
          <thead class="table-dark">
            <tr>
              <th>Item</th>
              <th>Gender</th>
              <th>Category</th>
              <th class="text-center" width="60">Count</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="row : ${breakdownRows}"
                th:classappend="${row['subtotal']} ? 'table-secondary fw-bold' : ''">
              <td th:text="${row['item']}"></td>
              <td th:text="${row['gender']}"></td>
              <td th:text="${row['category']}"></td>
              <td class="text-center fw-bold" th:text="${row['count']}"></td>
            </tr>
          </tbody>
          <tfoot class="table-dark">
            <tr>
              <td colspan="3" class="fw-bold text-end pe-3">Grand Total</td>
              <td class="text-center fw-bold" th:text="${totalParticipations}"></td>
            </tr>
          </tfoot>
        </table>
      </div>

    </div>
  </div>

  <div class="print-time text-center text-muted mt-3" style="font-size:11px;">
    Printed on:
    <span th:text="${#temporals.format(#temporals.createNow(), 'dd-MM-yyyy hh:mm a')}"></span>
  </div>

</div><!-- end page-wrapper -->

<script>
function showAll() {
  const form = document.getElementById('search-form');
  form.querySelectorAll('input, select').forEach(el => el.value = '');
  form.submit();
}
</script>
</body>
</html>
