<!-- fragments/add_event_item.html -->
<div th:fragment="content" class="container-fluid">
    <!-- Modal Header -->
    <div class="modal-header">
        <h5 class="modal-title" id="addEventItemModalLabel" th:text="${pageTitle}">Add Event Item</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
    </div>

    <!-- Modal Body -->
	<div class="modal-body">

	    <div class="alert alert-warning small mb-3">

	        <strong>Important:</strong>

	        Existing participation entries of shifted members
	        will be removed automatically.

	        Re-entry must be done manually
	        under the shifted category.

	    </div>

	    <form
	        th:action="@{/champ_category_shift/{eventId}/{nodeId}(eventId=${eventId}, nodeId=${nodeId})}"
	        method="post"
	        th:object="${dto}"
	        id="addShiftCatForm">

	        <!-- CSRF -->
	        <input type="hidden"
	               th:name="${_csrf.parameterName}"
	               th:value="${_csrf.token}" />

	        <!-- MEMBER -->
	        <div class="mb-3">

	            <label class="form-label">
	                Member
	            </label>

	            <select th:field="*{memCatShifMemId}"
	                    class="form-select"
	                    required>

	                <option value="">
	                    Select Member
	                </option>

	                <option th:each="m : ${members}"

	                        th:value="${m.userId}"

	                        th:data-category="${memberCategoryMap[m.userId]}"

	                        th:text="${m.userFname + ' ' + m.userLname
	                        + ' (' + memberCategoryMap[m.userId] + ')'}">
	                </option>

	            </select>

	        </div>

	        <!-- TARGET CATEGORY -->
	        <div class="mb-3">

	            <label class="form-label">
	                Shift To Category
	            </label>

	            <select th:field="*{memCatShifCategory}"
	                    class="form-select"
	                    required>

	                <option value="">
	                    Select Category
	                </option>

	                <option th:each="c : ${categories}"
	                        th:value="${c}"
	                        th:text="${c}">
	                </option>

	            </select>

	        </div>

	        <div id="error-messages"
	             class="text-danger small mt-2">
	        </div>

	    </form>

	    <!-- ========================================== -->
	    <!-- EXISTING SHIFTS -->
	    <!-- ========================================== -->

	    <hr class="my-4">

	    <h6 class="fw-bold mb-3">
	        Existing Shifted Participants
	    </h6>

	    <div class="table-responsive">

	        <table class="table table-bordered table-sm align-middle">

	            <thead class="table-light">

	                <tr>

	                    <th>Member</th>

	                    <th>Original</th>

	                    <th>Shifted</th>

	                </tr>

	            </thead>

	            <tbody>

	                <tr th:if="${#lists.isEmpty(existingShifts)}">

	                    <td colspan="3"
	                        class="text-center text-muted">

	                        No category shifts found

	                    </td>

	                </tr>

	                <tr th:each="shift : ${existingShifts}">

	                    <td th:text="${shift.memCatShifMemId.userFname
	                        + ' '
	                        + shift.memCatShifMemId.userLname}">
	                    </td>

	                    <td>

	                        <span class="badge bg-secondary"
	                              th:text="${shift.originalCategory}">
	                        </span>

	                    </td>

	                    <td>

	                        <span class="badge bg-warning text-dark"
	                              th:text="${shift.memCatShifCategory}">
	                        </span>

	                    </td>

	                </tr>

	            </tbody>

	        </table>

	    </div>

	</div>

    <!-- Modal Footer -->
    <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary" onclick="submitHtmlForm('addShiftCatForm')">Shift Category</button>
    </div>
</div>

<style>
/* Match the style of designation add modal */
#addEventItemForm { max-width: 100%; }
.modal-dialog { max-width: 60% !important; }
@media (max-width: 768px) {
    .modal-dialog { max-width: 100% !important; margin: 10px; }
}

</style>
