<!-- fragments/node_users.html -->
<div th:fragment="content" /*th:if="${showMemberPanel}" * />



<div class="container mt-1 mb-3 px-0">
	<div class="row align-items-center">

		<!-- Left: Node Name (4 cols) -->	
		
		<div  th:if="${#strings.equals(MyNodeType, 'KALARI')}" class="d-flex align-items-center justify-content-between">
		    <h4 class="mb-3 px-3 py-2 rounded d-flex align-items-center justify-content-between"
		        style="background-color: var(--bs-gray-200); font-size: 1.1rem; font-weight: 600; color: var(--bs-dark); width: 100%;">
		        
				<a th:onclick="'loadContent(\'/branch_nodeview/' + ${parentId} + '\', \'modal\')'"
				   class="text-decoration-none cursor-pointer" style="cursor: pointer;">
				    <span th:text="${nodeName}">Association</span>
				</a>

		        
		        <a class="btn btn-sm btn-outline-primary px-1 py-1"
		           th:if="${(!isChild and #authorization.expression('hasAuthority(''PRIV_branch_nodeedit'')')) 
		                    or (isChild and #authorization.expression('hasAuthority(''PRIV_branch_nodeedit_child'')'))}"
		           th:onclick="'loadContent(\'/branch_nodeedit/' +${parentId}+ '\', \'modal\')'">
		            <i class="fas fa-edit"></i>
		        </a>
		    </h4>
		</div>
		
		<div th:unless="${#strings.equals(MyNodeType, 'KALARI')}" class="col-12 col-md-4 mb-2 mb-md-0">
			<h4 class="mb-0 px-3 py-2 rounded"
				style="background-color: var(--bs-gray-200); font-size: 1.1rem; font-weight: 600; color: var(--bs-dark);">
				<label th:text="${nodeName}">Kalari</label>
			</h4>
		</div>
		

		<!-- Right: Radio Buttons (8 cols) -->
		<div class="col-12 col-md-8">
			<div class="row" style="padding-left: .75rem;">
				<input type="hidden" id="tempSelectedId" name="tempSelectedId"
					th:value="${parentId}" />

				<div
					th:if="${nodeType != 'KALARI' and #authorization.expression('hasAuthority(''PRIV_branch_nodelist'')')}"
					class="col-6 col-md-3 mb-2 mb-md-0">
					<div class="form-check">
						<input class="form-check-input" type="radio" name="choice"
							id="option1" value="nodes"
							th:onclick="|loadContent('branch_nodelist/${parentId}', '#users_target'); clearTreeForm()|">
						<label class="form-check-label" for="option1"
							style="cursor: pointer;">Associations</label>
					</div>
				</div>

				<div
					th:if="${#authorization.expression('hasAuthority(''PRIV_officials_bynode'')')}"
					class="col-6 col-md-3 mb-2 mb-md-0">
					<div class="form-check">
						<input class="form-check-input" type="radio" name="choice"
							id="option2" value="officials"
							th:onclick="|loadContent('officials_bynode/${parentId}', '#users_target'); clearTreeForm()|">
						<label class="form-check-label" for="option2"
							style="cursor: pointer;">Officials</label>
					</div>
				</div>

				<div
					th:if="${nodeType == 'KALARI' and #authorization.expression('hasAuthority(''PRIV_members_bynode'')')}"
					class="col-6 col-md-3 mb-2 mb-md-0">
					<div class="form-check">
						<input class="form-check-input" type="radio" name="choice"
							id="option3" value="members" checked
							th:onclick="|loadContent('members_bynode/${parentId}', '#users_target'); clearTreeForm()|">
						<label class="form-check-label" for="option3"
							style="cursor: pointer;">Participants</label>
					</div>
				</div>

				<div
					th:if="${#authorization.expression('hasAuthority(''PRIV_champ_eventbynode'')')}"
					class="col-6 col-md-3 mb-2 mb-md-0">
					<div class="form-check">
						<input class="form-check-input" type="radio" name="choice"
							id="option4" value="events"
							th:onclick="|loadContent('champ_eventbynode/${parentId}', '#users_target'); clearTreeForm()|">
						<label class="form-check-label" for="option4"
							style="cursor: pointer;">Events</label>
					</div>
				</div>

				<div
					th:if="${nodeType == 'KALARI' and #authorization.expression('hasAuthority(''PRIV_champ_eventall'')')}"
					class="col-6 col-md-3 mb-2 mb-md-0">
					<div class="form-check">
						<input class="form-check-input" type="radio" name="choice"
							id="option5" value="eventsall"
							th:onclick="|loadContent('champ_eventall/${parentId}', '#users_target'); clearTreeForm()|">
						<label class="form-check-label" for="option5"
							style="cursor: pointer;">All Events</label>
					</div>
				</div>

			</div>
		</div>
	</div>
</div>



<div class="d-flex justify-content-between align-items-center mb-3">
	<h4 class="mb-0">
		PARTICIPANTS [<span th:text="${#lists.size(users)}"></span>]
	</h4>
	<h1>
		<!--  (<span //th:text="${isChild}"></span>)</h1>-->

		<a
			th:if="${#authorization.expression('hasAuthority(''PRIV_members_add'')')}"
			class="btn btn-sm btn-outline-primary me-1 ajax-link"
			href="javascript:void(0);"
			th:onclick="'loadContent(\'' + @{'/members_add/' + ${parentId}} + '\', \'modal\')'">
			<i class="fas fa-plus"></i> Add New Participant
		</a>
</div>


<!-- SEARCH BAR -->
<div class="row mb-4">

    <div class="col-12">

        <div class="position-relative">

            <input type="text"
                   id="memberSearch"
                   class="form-control form-control-lg ps-5"
                   placeholder="Search participant by name...">

            <i class="fas fa-search position-absolute"
               style="left:18px; top:50%; transform:translateY(-50%); color:#999;"></i>

        </div>

    </div>

</div>


<!-- MEMBERS -->
<div class="table-responsive">

    <div class="row" id="membersContainer">

        <div class="col-12 col-lg-6 mb-3 member-item"
             th:each="user, iterStat : ${users}"

             th:attr="data-name=${#strings.toLowerCase(user.userFname + ' ' + user.userLname)}">

            <div class="card shadow-sm border-0 member-card h-100">

                <div class="card-body">

                    <div class="d-flex align-items-start">

                        <!-- PHOTO -->
                        <div class="me-3 flex-shrink-0">

                            <img
                                th:src="'https://app.indiankalaripayattufederation.com/image_public/' + ${user.photoFile}"
                                onerror="this.src='/images/default-user.png'"
                                class="member-photo"
                                alt="Member Photo">

                        </div>

                        <!-- CONTENT -->
                        <div class="flex-grow-1">

                            <!-- TOP ROW -->
                            <div class="d-flex justify-content-between align-items-start gap-2">

                                <!-- LEFT SIDE -->
                                <div class="flex-grow-1">

                                    <h5 class="mb-1 fw-bold text-dark">
                                        <span th:text="${user.userFname}"></span>
                                        <span th:text="${user.userLname}"></span>
                                    </h5>

                                    <div class="text-muted small mb-2">
                                        Participant ID :
                                        <span th:text="${user.userId}"></span>
                                    </div>

                                    <!-- VERIFIED -->
                                    <div th:if="${user.verificationStatus == 1}">
                                        <span class="badge bg-success px-3 py-2">
                                            <i class="fas fa-check-circle"></i>
                                            Verified Participant
                                        </span>
                                    </div>

                                </div>

                                <!-- ACTIONS -->
                                <div class="d-flex flex-column flex-sm-row gap-2 align-items-end">

                                    <!-- VIEW -->
                                    <a class="btn btn-sm btn-outline-primary"

                                       th:onclick="'loadContent(\'/members_details/' + ${xorMaskHelper.mask(user.userId)} + '\', \'modal\')'">

                                        <i class="fas fa-eye"
                                           th:classappend="${user.userStatus == 1} ? ' text-success' : ' text-danger'"></i>

                                        <span class="ms-1">View</span>

                                    </a>

                                    <!-- EDIT -->
                                    <a class="btn btn-sm btn-outline-primary"

                                       th:if="${#authorization.expression('hasAuthority(''PRIV_members_edit'')')}"

                                       th:onclick="'loadContent(\'/members_edit/' + ${xorMaskHelper.mask(user.userId)} + '\', \'modal\')'">

                                        <i class="fas fa-edit"></i>
                                        <span class="ms-1">Edit</span>

                                    </a>

                                </div>

                            </div>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>


<style>

.search-active {
    color: var(--bs-body-color) !important;
    background-color: var(--bs-body-bg) !important;
    border-color: red !important;
    outline: 0 !important;
    box-shadow: 0 0 0 .25rem rgba(253, 13, 13, 0.25) !important;
}

</style>

<script>

(function () {

    const searchBox = document.getElementById("memberSearch");

    if (!searchBox) return;

    searchBox.addEventListener("input", function () {

        const keyword = this.value.toLowerCase().trim();

        // toggle bootstrap-like active focus style
        this.classList.toggle("search-active", keyword.length > 0);

        document.querySelectorAll(".member-item").forEach(member => {

            const name = member.dataset.name || "";

            member.style.display =
                name.includes(keyword) ? "" : "none";

        });

    });

})();

</script>
</div>
