<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Certificate Verification</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-4">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h2 class="h5 mb-0">Certificate Verification</h2>
            </div>
            
            <div class="card-body">
				<div th:if="${not #lists.isEmpty(results)}">

				    <div class="row mb-4">

				        <div class="col-md-6">

				            <h4 th:text="${results[0].get('event_name')}"></h4>

				            <p class="text-muted">
				                Year:
				                <span th:text="${results[0].get('mei_event_year')}"></span>
				            </p>

				        </div>

				        <div class="col-md-6 text-md-end">

				            <div class="d-inline-block bg-light p-3 rounded">

				                <h5 th:text="${results[0].get('member_name')}"></h5>

				                <p>
				                    Representing:
				                    <span th:text="${results[0].get('member_node_name')}"></span>
				                </p>

				            </div>

				        </div>

				    </div>

				    <table class="table table-bordered">

				        <thead>

				        <tr>
				            <th>Item</th>
				            <th>Grade</th>
				        </tr>

				        </thead>

				        <tbody>

				        <tr th:each="row : ${results}">

				            <td th:text="${row.get('mei_item_name')}"></td>

				            <td>
				                <span class="badge bg-primary"
				                      th:text="${row.get('mei_grade')}">
				                </span>
				            </td>


				        </tr>

				        </tbody>

				    </table>

				    <div class="row mt-4">

				        <div class="col-md-6">

				            <dl class="row">

				                <dt class="col-sm-5">
				                    Certificate ID
				                </dt>

				                <dd class="col-sm-7"
				                    th:text="${results[0].get('mei_id')}">
				                </dd>

				                <dt class="col-sm-5">
				                    Category
				                </dt>

				                <dd class="col-sm-7"
				                    th:text="${results[0].get('mei_category')}">
				                </dd>

				                <dt class="col-sm-5">
				                    Gender
				                </dt>

				                <dd class="col-sm-7"
				                    th:text="${results[0].get('mei_gender')}">
				                </dd>

				            </dl>

				        </div>

				        <div class="col-md-6">

				            <dl class="row">

				                <dt class="col-sm-5">
				                    Chest No
				                </dt>

				                <dd class="col-sm-7"
				                    th:text="${results[0].get('mei_chest_no')}">
				                </dd>

				                <dt class="col-sm-5">
				                    Certificate Status
				                </dt>

				                <dd class="col-sm-7"
				                    th:text="${results[0].get('mei_certificate_status')}">
				                </dd>

				                <dt class="col-sm-5">
				                    Verified On
				                </dt>

				                <dd class="col-sm-7"
				                    th:text="${#temporals.format(#temporals.createNow(),'dd/MM/yyyy HH:mm')}">
				                </dd>

				            </dl>

				        </div>

				    </div>

				</div>
                
                <div th:if="${#lists.isEmpty(results)}" class="alert alert-warning">
                    No certificate found with the provided verification ID.
                </div>
            </div>
            
            <div class="card-footer text-muted text-center">
				<small>
				This certificate record was issued and retrieved from the official IKF certificate database.
				</small>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
