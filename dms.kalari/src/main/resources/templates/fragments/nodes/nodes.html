
<!-- fragments/node_list.html -->
<div th:fragment="content">


	<div class="container mt-1 mb-3 px-0">
		<div class="row align-items-center">

			<!-- Left: Node Name (4 cols) -->
			<div class="col-12 col-md-5 mb-2 mb-md-0">

					
			<div class="d-flex align-items-center justify-content-between">
			    <h4 class="mb-0 px-3 py-2 rounded d-flex align-items-center justify-content-between"
			        style="background-color: var(--bs-gray-200); font-size: 1.1rem; font-weight: 600; color: var(--bs-dark); width: 100%;">
			        
					<a th:onclick="'loadContent(\'/branch_nodeview/' + ${parentId} + '\', \'modal\')'"
					   class="text-decoration-none cursor-pointer" style="cursor: pointer;">
					    <span th:text="${nodeName}">Association</span>
					</a>

			        
			        <a class="btn btn-sm btn-outline-primary px-1 py-1"
			           th:if="${(!isChild and #authorization.expression('hasAuthority(''PRIV_branch_nodeedit'')')) 
			                    or (isChild and #authorization.expression('hasAuthority(''PRIV_branch_nodeedit_child'')'))}"
			           th:onclick="'loadContent(\'/branch_nodeedit/' +${parentId}+ '\', \'modal\')'">
			            <i class="fas fa-edit"></i>
			        </a>
			    </h4>
			</div>


					
				
			</div>

			<!-- Right: Radio Buttons (8 cols) -->
			<div class="col-12 col-md-7">
				<div class="row" style="padding-left: .75rem;">
					<input type="hidden" id="tempSelectedId" name="tempSelectedId"
						th:value="${parentId}" />

					<div
						th:if="${nodeType != 'KALARI' and #authorization.expression('hasAuthority(''PRIV_branch_nodelist'')')}"
						class="col-6 col-md-3 mb-2 mb-md-0">
						<div class="form-check">
							<input class="form-check-input" type="radio" name="choice"
								id="option1" value="nodes" checked
								th:onclick="|loadContent('branch_nodelist/${parentId}', '#users_target'); clearTreeForm()|">
							<label class="form-check-label" for="option1"
								style="cursor: pointer;">Associations</label>
						</div>
					</div>

					<div
						th:if="${#authorization.expression('hasAuthority(''PRIV_officials_bynode'')')}"
						class="col-6 col-md-3 mb-2 mb-md-0">
						<div class="form-check">
							<input class="form-check-input" type="radio" name="choice"
								id="option2" value="officials"
								th:onclick="|loadContent('officials_bynode/${parentId}', '#users_target'); clearTreeForm()|">
							<label class="form-check-label" for="option2"
								style="cursor: pointer;">Officials</label>
						</div>
					</div>

					<div
						th:if="${nodeType == 'KALARI' and #authorization.expression('hasAuthority(''PRIV_members_bynode'')')}"
						class="col-6 col-md-3 mb-2 mb-md-0">
						<div class="form-check">
							<input class="form-check-input" type="radio" name="choice"
								id="option3" value="members"
								th:onclick="|loadContent('members_bynode/${parentId}', '#users_target'); clearTreeForm()|">
							<label class="form-check-label" for="option3"
								style="cursor: pointer;">Participants</label>
						</div>
					</div>

					<div
						th:if="${#authorization.expression('hasAuthority(''PRIV_champ_eventbynode'')')}"
						class="col-6 col-md-3 mb-2 mb-md-0">
						<div class="form-check">
							<input class="form-check-input" type="radio" name="choice"
								id="option4" value="events"
								th:onclick="|loadContent('champ_eventbynode/${parentId}', '#users_target'); clearTreeForm()|">
							<label class="form-check-label" for="option4"
								style="cursor: pointer;">Events</label>
						</div>
					</div>

					<div
						th:if="${nodeType == 'KALARI' and #authorization.expression('hasAuthority(''PRIV_champ_eventall'')')}"
						class="col-6 col-md-3 mb-2 mb-md-0">
						<div class="form-check">
							<input class="form-check-input" type="radio" name="choice"
								id="option5" value="eventsall"
								th:onclick="|loadContent('champ_eventall/${parentId}', '#users_target'); clearTreeForm()|">
							<label class="form-check-label" for="option5"
								style="cursor: pointer;">All Events</label>
						</div>
					</div>

				</div>
			</div>
		</div>
	</div>






	<div class="row align-items-center mb-3">
	    
	    <div class="col-12 col-md-auto mb-2 mb-md-0">
	        <h4 class="mb-0">
	            <span th:text="${nextNodeType}"></span> Association (<span th:text="${#lists.size(nodeList)}"></span>)
	        </h4>
	    </div>

	    <div class="col-12 col-md d-flex justify-content-end">
	        <a
	            th:if="${(!isChild and #authorization.expression('hasAuthority(''PRIV_branch_nodeadd'')')) 
	           or (isChild and #authorization.expression('hasAuthority(''PRIV_branch_nodeadd_child'')'))}"
	            class="btn btn-sm btn-outline-primary ajax-link"
	            href="javascript:void(0);"
	            th:onclick="'loadContent(\'' + @{'/branch_nodeadd/' + ${parentId}} + '\', \'modal\')'">
	            <i class="fas fa-plus"></i> Add New <span th:text="${nextNodeType}"></span> Association
	        </a>
	    </div>

	</div>


	<!-- SEARCH -->
	<div class="row mb-4">

	    <div class="col-12">

	        <div class="position-relative">

	            <input type="text"
	                   id="memberSearch"
	                   class="form-control form-control-lg ps-5"
	                   placeholder="Search association by name...">

	            <i class="fas fa-search position-absolute"
	               style="left:18px; top:50%; transform:translateY(-50%); color:#999;"></i>

	        </div>

	    </div>

	</div>


	<!-- NODE CARDS -->
	<div class="table-responsive">

	    <div class="row" id="membersContainer">

	        <div class="col-12 col-lg-6 mb-3 member-item"
	             th:each="node, iterStat : ${nodeList}"

	             th:attr="data-name=${#strings.toLowerCase(node.nodeName)}">

	            <div class="card shadow-sm border-0 member-card h-80">

	                <div class="card-body">

	                    <div class="d-flex justify-content-between align-items-start gap-3">

	                        <!-- LEFT -->
	                        <div class="flex-grow-1">

	                            <!-- SERIAL -->
								<div class="d-flex align-items-center gap-3 text-muted small fw-bold mb-2">

								    <!-- SERIAL -->
								    <div>
								        #<span th:text="${iterStat.count}">1</span>
								    </div>

								    <!-- STATUS -->
								    <div class="detail-value">

								        <span th:if="${node.nodeStatus == 1}"
								              class="text-success">

								            <i class="fas fa-check-circle me-1"></i>
								            Active

								        </span>

								        <span th:if="${node.nodeStatus == 2}"
								              class="text-secondary">

								            <i class="fas fa-times-circle me-1"></i>
								            Inactive

								        </span>

								    </div>

								</div>

	                            <!-- NODE NAME -->
	                            <h5 class="mb-2 fw-bold text-dark">

	                                <!-- KALARI -->
	                                <span th:if="${node.nodeTypeLabel == 'KALARI'}">

	                                    <a href="#"
	                                       class="text-decoration-none"

	                                       th:text="${node.nodeName}"

	                                       th:onclick="'loadContent(`/officials_bynode/' + ${xorMaskHelper.mask(node.nodeId)} + '`, \'#users_target\'); return false;'">
	                                    </a>

	                                </span>

	                                <!-- NON KALARI WITH PERMISSION -->
	                                <a href="#"
	                                   class="text-decoration-none"

	                                   th:if="${node.nodeTypeLabel != 'KALARI' and #authorization.expression('hasAuthority(''PRIV_branch_nodelist'')')}"

	                                   th:text="${node.nodeName}"

	                                   th:onclick="'loadContent(`/branch_nodelist/' + ${xorMaskHelper.mask(node.nodeId)} + '`, \'#users_target\'); return false;'">
	                                </a>

	                                <!-- NON KALARI WITHOUT PERMISSION -->
	                                <span th:if="${node.nodeTypeLabel != 'KALARI' and !#authorization.expression('hasAuthority(''PRIV_branch_nodelist'')')}"
	                                      th:text="${node.nodeName}">
	                                </span>

	                            </h5>

	                            <!-- REGISTER NUMBER -->
	                            <div class="text-muted small mb-2">

	                                Register Number :
	                                <span th:text="${node.registerNumber != null ? node.registerNumber : '-'}"></span>

	                            </div>



	                        </div>

	                        <!-- ACTIONS -->
	                        <div class="d-flex flex-column flex-sm-row gap-2 align-items-end">

	                            <!-- VIEW -->
	                            <a class="btn btn-sm btn-outline-primary"

	                               th:onclick="'loadContent(\'/branch_nodeview/' + ${xorMaskHelper.mask(node.nodeId)} + '\', \'modal\')'">

	                                <i class="fas fa-eye"
	                                   th:classappend="${node.nodeStatus == 1} ? ' text-success' : ' text-danger'"></i>

	                                <span class="ms-1">View</span>

	                            </a>

	                            <!-- EDIT -->
	                            <a class="btn btn-sm btn-outline-primary"

	                               th:if="${(!isChild and #authorization.expression('hasAuthority(''PRIV_branch_nodeedit'')'))
	                               or (isChild and #authorization.expression('hasAuthority(''PRIV_branch_nodeedit_child'')'))}"

	                               th:onclick="'loadContent(\'/branch_nodeedit/' + ${xorMaskHelper.mask(node.nodeId)} + '\', \'modal\')'">

	                                <i class="fas fa-edit"></i>

	                                <span class="ms-1">Edit</span>

	                            </a>

	                        </div>

	                    </div>

	                </div>

	            </div>

	        </div>


	        <!-- EMPTY -->
	        <div class="col-12"
	             th:if="${nodeList == null or #lists.isEmpty(nodeList)}">

	            <div class="alert alert-light border text-center">
	                No Associations found
	            </div>

	        </div>

	    </div>



	<style>

	.search-active {
	    color: var(--bs-body-color) !important;
	    background-color: var(--bs-body-bg) !important;
	    border-color: red !important;
	    outline: 0 !important;
	    box-shadow: 0 0 0 .25rem rgba(253, 13, 13, 0.25) !important;
	}

	</style>


	<script>

	(function () {

	    const searchBox = document.getElementById("memberSearch");

	    if (!searchBox) return;

	    searchBox.addEventListener("input", function () {

	        const keyword = this.value.toLowerCase().trim();

	        this.classList.toggle(
	            "search-active",
	            keyword.length > 0
	        );

	        document.querySelectorAll(".member-item").forEach(member => {

	            const name = member.dataset.name || "";

	            member.style.display =
	                name.includes(keyword)
	                ? ""
	                : "none";

	        });

	    });

	})();

	</script>
	
	
		<div 		th:if="${!(nodeType == MyNodeType or MyNodeType == 'KALARI')
		        and #authorization.expression('hasAuthority(''PRIV_branch_nodelist'')')}" class="col-12 col-md d-flex justify-content-end">
		    <a href="#"
		       class="btn btn-sm btn-outline-primary d-flex align-items-center justify-content-center px-2 py-1"
		       th:onclick="'loadContent(\'/branch_nodelist/' + ${MyParentId} + '\', \'#users_target\'); return false;'">
		        <i class="fas fa-arrow-left"></i> Back to Parent
		    </a>
		</div>
	</div>

</div>
